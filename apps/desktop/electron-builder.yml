appId: com.gamerscream.app
productName: GamerScream
executableName: GamerScream
copyright: Copyright © 2026 GamerScream

directories:
  output: release

files:
  - out/**/*
  - package.json

extraResources:
  - from: build/app-update.yml
    to: app-update.yml

publish:
  provider: github
  owner: burakereno
  repo: GamerScream-app
  releaseType: release

mac:
  target:
    - zip
  category: public.app-category.social-networking
  icon: build/ico.icns
  artifactName: ${productName}.${ext}
  hardenedRuntime: true
  gatekeeperAssess: false
  notarize: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  extendInfo:
    NSMicrophoneUsageDescription: GamerScream uses your microphone for voice chat.
    NSLocalNetworkUsageDescription: GamerScream connects to voice-chat services on your network.

win:
  target:
    - nsis
  icon: build/ico.ico
  artifactName: ${productName}-Setup.${ext}
  # Windows releases are intentionally unsigned. Keep this explicit so the
  # updater does not expect publisher metadata that cannot exist.
  verifyUpdateCodeSignature: false

nsis:
  oneClick: true
  allowToChangeInstallationDirectory: false
