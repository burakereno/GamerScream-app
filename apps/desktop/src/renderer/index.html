<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self' http://localhost:3002 ws://localhost:* https://gamerscream.duckdns.org wss://gamerscream.duckdns.org; media-src 'self' blob: data:; worker-src 'self' blob:; object-src 'none'; base-uri 'none'; frame-ancestors 'none'; form-action 'self'"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#09090b" />
    <meta name="color-scheme" content="dark" />
  <title>GamerScream</title>
  <style>
    /* Inline splash — visible until React mounts and replaces #root content */
    body { margin: 0; background: #09090b; }
    .splash {
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
    }
    .splash-logo {
      height: 20px;
      width: auto;
      opacity: 0.7;
      filter: drop-shadow(0 2px 12px rgba(249,115,22,0.2));
    }
    .splash-spinner {
      width: 28px;
      height: 28px;
      border: 3px solid rgba(255,255,255,0.08);
      border-top-color: #f97316;
      border-radius: 50%;
      animation: sp .8s linear infinite;
    }
    @keyframes sp { to { transform: rotate(360deg); } }
  </style>
</head>

<body>
  <div id="root">
    <!-- Splash: auto-replaced when React mounts -->
    <div class="splash">
      <img class="splash-logo" src="./assets/logo.svg" alt="GamerScream" />
      <div class="splash-spinner"></div>
    </div>
  </div>
  <script type="module" src="./main.tsx"></script>
</body>

</html>
